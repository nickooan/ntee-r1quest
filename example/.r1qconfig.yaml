sock: ./test.sock
# Days an AI session is kept before startup cleanup prunes it (default: 7).
session-cleanup-period: 7
custom-suggestions:
  - some-style-id
  - x-trace-token
  - x-correlation-id
custom-ai-commands:
  - name: test
    description: use for testing
    instruction: testing message, this is $1 and $2 and $3
